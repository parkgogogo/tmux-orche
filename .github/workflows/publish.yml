name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-binaries:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-15-intel
            target: darwin-x64
          - os: macos-latest
            target: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: python -m pip install -U pip pyinstaller .

      - name: Build binary
        run: bash scripts/build-binary.sh

      - name: Smoke test binary
        run: ./dist/orche --version

      - name: Archive binary
        env:
          TAG_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          archive="orche-${TAG_NAME}-${TARGET}.tar.gz"
          tar -czf "${archive}" -C dist orche
          echo "ARCHIVE_NAME=${archive}" >> "$GITHUB_ENV"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tmux-orche
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Verify tag ref
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" || ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Publish workflow must run from a semantic version tag ref (for example v0.4.1)."
            exit 1
          fi

      - name: Verify tag matches package version
        run: |
          expected_version="${GITHUB_REF_NAME#v}"
          package_version="$(python - <<'PY'
          import runpy
          print(runpy.run_path("src/version.py")["__version__"])
          PY
          )"

          if [[ "${package_version}" != "${expected_version}" ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package version ${package_version}."
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --latest
          else
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --generate-notes \
              --latest
          fi

  upload-binaries:
    needs:
      - build-binaries
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Upload binaries to release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mapfile -t archives < <(find dist-artifacts -type f -name '*.tar.gz' | sort)
          if [[ "${#archives[@]}" -eq 0 ]]; then
            echo "::error::No binary archives were downloaded."
            exit 1
          fi
          gh release upload "${TAG_NAME}" "${archives[@]}" --clobber
