[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "orche"
version = "0.1.0"
description = "Typer-based CLI for tmux-backed Codex orchestration"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "rich>=13.9.0",
  "typer>=0.16.0",
]

[project.scripts]
orche = "orche.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/orche"]
